app = 'jqplay-next'
primary_region = 'iad'

# OOM cushion for the 512MB machine: lets the kernel page out cold memory under
# a transient spike (e.g. concurrent server-side jq) instead of OOM-killing the
# Next.js server. A backstop, not a substitute for the jq pool limits.
swap_size_mb = 512

[build]
dockerfile = "Dockerfile"

[deploy]
release_command = 'node node_modules/prisma/build/index.js migrate deploy'

[http_service]
internal_port = 3000
force_https = true
auto_start_machines = true
auto_stop_machines = "off"
min_machines_running = 2
processes = ['app']

[[vm]]
size = 'shared-cpu-1x'
memory = 512

[[http_service.checks]]
grace_period = "5s"
interval = "30s"
timeout = "5s"
method = "GET"
path = "/api/health"
